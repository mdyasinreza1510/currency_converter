<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURRENCY CONVERT.io</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top">
<p>CURRENCY CONVERTER</p>
</div>
<div class="container">
<h2>Currency Converter</h2>
<p id="text_msg">Convert Any Amount From One Currency To Another</p>
       <form>
        <div class="amount">
            <input  type="number" placeholder="enter amount">
        </div>   
<div class="dropdown">
            
                <div class="from">
                    <div class="container-selection">
                    
                    <select name="from" id="">
                        <option value="USD">USD</option>
                    </select>
                    
                </div>
            </div>
                <div><i class="bi bi-arrow-left-right"></i></div>
                <div class="to">
                    <div class="container-selection">
                   
                    <select name="to" id="">
                    
                        <option value="INR">INR</option>
                        
                    </select>
                    
                </div>
            </div>
                
            
    </div> 
    
     <button id="button">Exchange</button>
     <div class="msg"><p id="msg">1USD =94INR </p></div>
        </form>
       
       
</div>
    <script src="codes.js"></script>
    <script src="app.js"></script>
</body>
</html>
